<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8c8ff"/>
      <stop offset="100%" style="stop-color:#7eb8f7"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="100" height="100" fill="url(#bg)" rx="24"/>
  <!-- face -->
  <circle cx="50" cy="46" r="28" fill="#fff" opacity="0.95"/>
  <!-- eyes -->
  <circle cx="41" cy="42" r="4.5" fill="#4a4a7a"/>
  <circle cx="59" cy="42" r="4.5" fill="#4a4a7a"/>
  <circle cx="42.5" cy="40.5" r="1.5" fill="white"/>
  <circle cx="60.5" cy="40.5" r="1.5" fill="white"/>
  <!-- smile -->
  <path d="M40 52 Q50 62 60 52" stroke="#4a4a7a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- coin -->
  <circle cx="72" cy="26" r="13" fill="#FFD700"/>
  <circle cx="72" cy="26" r="10" fill="#FFC200"/>
  <text x="72" y="30.5" text-anchor="middle" font-size="13" font-weight="900" fill="#a07000">$</text>
  <!-- headphone left -->
  <path d="M22 45 Q20 30 35 28" stroke="#6C63FF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="18" y="43" width="10" height="14" rx="5" fill="#6C63FF"/>
  <!-- headphone right -->
  <path d="M78 45 Q80 30 65 28" stroke="#6C63FF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="72" y="43" width="10" height="14" rx="5" fill="#6C63FF"/>
  <!-- status dot -->
  <circle cx="78" cy="82" r="6" fill="#22c55e"/>
  <circle cx="78" cy="82" r="3" fill="white"/>
</svg>
